<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Viagem EUA — Roteiro + Checklist ✈️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;--surface:#fff;--surface2:#f0ede8;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.15);
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#999;
  --accent:#1a6b4a;--accent-light:#e8f5ef;--accent-border:#a8d8be;
  --tip:#fffbeb;--tip-border:#fde68a;--tip-t:#92400e;
  --tag-ny:#e8e6f8;--tag-ny-t:#3d35a0;
  --tag-orlando:#fde8df;--tag-orlando-t:#9a3510;
  --tag-miami:#e8f5ef;--tag-miami-t:#1a6b4a;
  --tag-docs:#e6f0fb;--tag-docs-t:#1555a0;
  --cal-today:#1a6b4a;--cal-event:#e8f5ef;--cal-event-t:#1a6b4a;
  --radius:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1c1c1a;--surface2:#252523;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#f0ede8;--text2:#a0a09a;--text3:#666;
  --accent:#3ecf8e;--accent-light:#0d2b1e;--accent-border:#1a6b4a;
  --tip:#2a1f00;--tip-border:#78530a;--tip-t:#fcd34d;
  --tag-ny:#1e1a3a;--tag-ny-t:#a89eef;
  --tag-orlando:#2e1508;--tag-orlando-t:#f5a882;
  --tag-miami:#0d2b1e;--tag-miami-t:#3ecf8e;
  --tag-docs:#0d1e38;--tag-docs-t:#7ab8f5;
  --cal-today:#3ecf8e;--cal-event:#0d2b1e;--cal-event-t:#3ecf8e;
}}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.tab-btn{flex:1;padding:14px 8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}

/* HEADER */
.page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px}
.page-title{font-size:18px;font-weight:600;letter-spacing:-.4px}
.page-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);margin-top:3px}

/* CALENDAR */
.cal-wrap{padding:16px}
.cal-month{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.cal-month-header{padding:14px 16px;font-size:14px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cal-month-label{font-size:14px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;padding:8px 4px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);font-weight:500}
.cal-day{text-align:center;padding:6px 4px;min-height:44px;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;transition:background .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.cal-day:active{background:var(--surface2)}
.cal-day.empty{cursor:default}
.cal-day-num{font-size:13px;font-weight:500;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-day.has-event .cal-day-num{background:var(--accent);color:#fff;font-weight:600}
.cal-day.multi-city .cal-day-num{background:var(--accent);color:#fff}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.6}

/* DAY MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding-bottom:40px}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:12px auto 0}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.modal-date{font-size:13px;font-family:'DM Mono',monospace;color:var(--text2);margin-bottom:4px}
.modal-title{font-size:17px;font-weight:600}
.modal-city-tag{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;margin-top:8px}
.modal-body{padding:16px 20px}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px;font-family:'DM Mono',monospace}
.modal-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13.5px;line-height:1.45}
.modal-item:last-child{border-bottom:none}
.modal-item-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);min-width:42px;padding-top:2px;flex-shrink:0}
.modal-tip{font-size:11.5px;color:var(--tip-t);background:var(--tip);border:1px solid var(--tip-border);border-radius:6px;padding:6px 9px;margin-top:5px;line-height:1.4}
.close-btn{display:block;margin:16px 20px 0;padding:12px;background:var(--surface2);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;width:calc(100% - 40px);text-align:center;-webkit-tap-highlight-color:transparent}

/* CHECKLIST */
.cl-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px}
.cl-prog-row{display:flex;justify-content:space-between;margin-bottom:6px}
.cl-prog-text{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace}
.cl-prog-pct{font-size:12px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace}
.cl-prog-track{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden}
.cl-prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);width:0%}
.controls{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.controls::-webkit-scrollbar{display:none}
.ctrl-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;white-space:nowrap;padding:6px 14px;border-radius:99px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{background:var(--surface2)}
.cl-content{padding:0 16px}
.section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;gap:10px}
.section-header:active{background:var(--surface2)}
.sec-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.sec-icon{font-size:18px;flex-shrink:0;line-height:1}
.sec-info{flex:1;min-width:0}
.sec-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-top:2px}
.sec-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sec-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:3px 8px;border-radius:99px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);transition:all .2s}
.sec-badge.complete{background:var(--accent-light);color:var(--accent);border-color:var(--accent-border)}
.chevron{color:var(--text3);font-size:12px;transition:transform .25s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.items-wrap{display:none;border-top:1px solid var(--border)}
.items-wrap.open{display:block}
.item{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.item:last-child{border-bottom:none}
.item:active{background:var(--surface2)}
.item-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item-check.checked{background:var(--accent);border-color:var(--accent)}
.item-check.checked::after{content:'';display:block;width:10px;height:7px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translateY(-1px)}
.item-body{flex:1;min-width:0}
.item-text{font-size:13.5px;color:var(--text);line-height:1.45;transition:color .15s}
.item-text.checked{text-decoration:line-through;color:var(--text3)}
.item-tip{font-size:11.5px;color:var(--tip-t);background:var(--tip);border:1px solid var(--tip-border);border-radius:6px;padding:5px 8px;margin-top:5px;line-height:1.4}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:10px;font-weight:500;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px}
.tag-ny{background:var(--tag-ny);color:var(--tag-ny-t)}
.tag-orlando{background:var(--tag-orlando);color:var(--tag-orlando-t)}
.tag-miami{background:var(--tag-miami);color:var(--tag-miami-t)}
.tag-docs{background:var(--tag-docs);color:var(--tag-docs-t)}
.footer{text-align:center;padding:24px 20px 12px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.pop{animation:pop .25s ease}
</style>
</head>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">

      <div class="modal-date" id="m-date"></div>
      <div class="modal-title" id="m-title"></div>
      <div id="m-city-tag"></div>
    </div>
    <div class="modal-body" id="m-body"></div>
    <button class="close-btn" onclick="closeModalBtn()">Fechar</button>
  </div>
</div>

const DOW = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

function buildCalendar(){
  const wrap = document.getElementById('cal-wrap');
  // Build April 2026
  const y=2026, m=3; // April
  const label = 'Abril 2026';
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();

  let html = `<div class="cal-month">
    <div class="cal-month-header"><span class="cal-month-label">${label}</span><span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)">Toque num dia</span></div>
    <div class="cal-grid">`;
  DOW.forEach(d => html += `<div class="cal-dow">${d}</div>`);
  for(let i=0;i<firstDay;i++) html += `<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const key = dateKey(y,m,d);
    const hasEvent = !!itinerary[key];
    const city = dayCity[key];
    const cityC = city ? cityColors[city] : null;
    html += `<div class="cal-day${hasEvent?' has-event':''}" onclick="${hasEvent?`openDay('${key}')`:''}">
      <div class="cal-day-num" style="${hasEvent&&cityC?`background:${cityC.bg};color:${cityC.t}`:''}">
        ${d}
      </div>
      ${hasEvent?`<div class="cal-dot" style="${cityC?`background:${cityC.t}`:''};opacity:.7"></div>`:''}
    </div>`;
  }
  html += `</div></div>`;

  // Legend
  html += `<div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px">
    <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">Legenda</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">`;
  Object.entries(cityColors).forEach(([k,v]) => {
    html += `<span style="font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;background:${v.bg};color:${v.t}">${v.label}</span>`;
  });
  html += `</div></div>`;

  // Tips card
  html += `<div style="background:var(--tip);border:1px solid var(--tip-border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px">
    <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--tip-t);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📱 Apps essenciais</div>
    <div style="font-size:13px;color:var(--tip-t);line-height:1.6">
      <b>My Disney Experience</b> — ingressos, Lightning Lane e tempos de fila<br>
      <b>Universal Orlando</b> — ingressos e Express Pass<br>
      <b>GasBuddy</b> — encontrar o posto mais barato, pagar pelo app<br>
      <b>Roadtrippers</b> — planejamento de rotas de estrada<br>
      <b>MTA NYC</b> — metrô de Nova York
    </div>
  </div>`;

  wrap.innerHTML = html;
}

function openDay(key){
  const ev = itinerary[key];
  if(!ev) return;
  const [y,m,d] = key.split('-').map(Number);
  const date = new Date(y,m-1,d);
  const fmtDate = date.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const city = dayCity[key];
  const cityC = city ? cityColors[city] : null;

  document.getElementById('m-date').textContent = fmtDate;
  document.getElementById('m-title').textContent = ev.title;
  const cityTag = document.getElementById('m-city-tag');
  cityTag.innerHTML = cityC ? `<span class="modal-city-tag" style="background:${cityC.bg};color:${cityC.t}">${cityC.label}</span>` : '';

  let body = `<div class="modal-section"><div class="modal-section-title">Programação do dia</div>`;
  ev.items.forEach(item => {
    body += `<div class="modal-item">
      <div class="modal-item-time">${item.time||''}</div>
      <div>
        <div style="font-size:13.5px;line-height:1.45">${item.text}</div>
        ${item.tip?`<div class="modal-tip">💡 ${item.tip}</div>`:''}
      </div>
    </div>`;
  });
  body += `</div>`;
  document.getElementById('m-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e){
  if(e.target === document.getElementById('modal')) closeModalBtn();
}
function closeModalBtn(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function showTab(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const ids = ['roteiro','checklist'];
    b.classList.toggle('active', ids[i]===id);
  });
  document.querySelectorAll('.tab-content').forEach(c=>{
    c.classList.toggle('active', c.id==='tab-'+id);
  });
}

const tagLabel = { docs:'docs', ny:'NY', orlando:'Orlando', miami:'Miami' };
let checks = {};
let sOpen = {};

function loadCl(){ try{ const s=localStorage.getItem(STORE_KEY); if(s){const d=JSON.parse(s);checks=d.checks||{};sOpen=d.open||{};} }catch(e){} }
function saveCl(){ try{localStorage.setItem(STORE_KEY,JSON.stringify({checks,open:sOpen}));}catch(e){} }
function totalItems(){ return clData.reduce((s,c)=>s+c.items.length,0); }
function checkedCount(){ return Object.values(checks).filter(Boolean).length; }

function updateProgress(){
  const total=totalItems(), done=checkedCount(), pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=done+' de '+total+' itens';
  document.getElementById('prog-pct').textContent=pct+'%';
  clData.forEach(sec=>{
    const d=sec.items.filter((_,ii)=>checks[sec.id+'-'+ii]).length;
    const b=document.getElementById('badge-'+sec.id);
    if(b){b.textContent=d+'/'+sec.items.length;b.className='sec-badge'+(d===sec.items.length?' complete':'');}
    const c=document.getElementById('count-'+sec.id);
    if(c) c.textContent=d+' de '+sec.items.length+' concluídos';
  });
}

function toggleItem(secId,ii){
  const key=secId+'-'+ii;
  checks[key]=!checks[key];
  const box=document.getElementById('box-'+secId+'-'+ii);
  const lbl=document.getElementById('lbl-'+secId+'-'+ii);
  if(box){box.classList.toggle('checked',!!checks[key]);box.classList.add('pop');setTimeout(()=>box.classList.remove('pop'),260);}
  if(lbl) lbl.className='item-text'+(checks[key]?' checked':'');
  saveCl();updateProgress();
}

function toggleSection(id){
  sOpen[id]=!sOpen[id];
  document.getElementById('wrap-'+id)?.classList.toggle('open',!!sOpen[id]);
  document.getElementById('chev-'+id)?.classList.toggle('open',!!sOpen[id]);
  saveCl();
}

function expandAll(){ clData.forEach(s=>{sOpen[s.id]=true;document.getElementById('wrap-'+s.id)?.classList.add('open');document.getElementById('chev-'+s.id)?.classList.add('open');});saveCl(); }
function collapseAll(){ clData.forEach(s=>{sOpen[s.id]=false;document.getElementById('wrap-'+s.id)?.classList.remove('open');document.getElementById('chev-'+s.id)?.classList.remove('open');});saveCl(); }
function clearAll(){
  if(!confirm('Limpar todos os itens marcados?')) return;
  checks={};
  clData.forEach(sec=>sec.items.forEach((_,ii)=>{
    document.getElementById('box-'+sec.id+'-'+ii)?.classList.remove('checked');
    const l=document.getElementById('lbl-'+sec.id+'-'+ii);
    if(l) l.className='item-text';
  }));
  saveCl();updateProgress();
}

function renderChecklist(){
  const content=document.getElementById('cl-content');
  content.innerHTML=clData.map(sec=>{
    const itemsHtml=sec.items.map((item,ii)=>{
      const isChecked=!!checks[sec.id+'-'+ii];
      const tagsHtml=(item.tags||[]).map(t=>`<span class="tag tag-${t}">${tagLabel[t]||t}</span>`).join('');
      const tipHtml=item.tip?`<div class="item-tip">💡 ${item.tip}</div>`:'';
      return `<div class="item" onclick="toggleItem('${sec.id}',${ii})">
        <div class="item-check${isChecked?' checked':''}" id="box-${sec.id}-${ii}"></div>
        <div class="item-body">
          <div class="item-text${isChecked?' checked':''}" id="lbl-${sec.id}-${ii}">${item.text}</div>
          ${tagsHtml?`<div class="tags">${tagsHtml}</div>`:''}
          ${tipHtml}
        </div>
      </div>`;
    }).join('');
    const secDone=sec.items.filter((_,ii)=>checks[sec.id+'-'+ii]).length;
    const isOpen=!!sOpen[sec.id];
    return `<div class="section">
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <div class="sec-left">
          <span class="sec-icon">${sec.icon}</span>
          <div class="sec-info">
            <div class="sec-title">${sec.title}</div>
            <div class="sec-count" id="count-${sec.id}">${secDone} de ${sec.items.length} concluídos</div>
          </div>
        </div>
        <div class="sec-right">
          <span class="sec-badge${secDone===sec.items.length?' complete':''}" id="badge-${sec.id}">${secDone}/${sec.items.length}</span>
          <span class="chevron${isOpen?' open':''}" id="chev-${sec.id}">▼</span>
        </div>
      </div>
      <div class="items-wrap${isOpen?' open':''}" id="wrap-${sec.id}">${itemsHtml}</div>
    </div>`;
  }).join('');
  updateProgress();
}

buildCalendar();
loadCl();
renderChecklist();
